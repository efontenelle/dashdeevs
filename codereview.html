<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review — Developer Dashboard</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<script src="js/file-guard.js"></script>
<script
  src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"
  integrity="sha384-XcdcwHqIPULERb2yDEM4R0XaQKU3YnDsrTmjACBZyfdVVqjh6xQ4/DCMd7XLcA6Y"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>
</head>
<body>
<header class="topbar"></header>
<main>
  <h1>Code Review</h1>

  <div class="filters">
    <div class="field">
      <label for="start-date">Data início</label>
      <input type="date" id="start-date">
    </div>
    <div class="field">
      <label for="end-date">Data fim</label>
      <input type="date" id="end-date">
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button id="apply-btn" class="primary">Aplicar</button>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button id="refresh-btn">Recarregar</button>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button id="clear-cache-btn">Limpar cache</button>
    </div>
  </div>

  <div id="global-status"></div>

  <div class="card" style="margin-top: 16px;">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Repositórios monitorados (<span id="repo-count">0</span>)</h2>
      <button id="toggle-repos-panel">&#9660; Expandir</button>
    </div>
    <div id="repos-panel" style="display: none;">
      <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
        <button id="toggle-all-repos">Marcar/Desmarcar todos</button>
      </div>
      <div id="repo-checkboxes" style="display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 8px;"></div>
      <div style="margin-top: 8px; text-align: right;">
        <button id="collapse-repos-panel">&#9650; Recolher</button>
      </div>
    </div>
  </div>

  <div class="grid grid-5" id="kpi-row" style="margin-top: 16px;"></div>

  <div class="card" id="build-card" style="margin-top: 16px; display:none;">
    <div class="card-header" style="margin-bottom: 8px;">
      <h2>Build & CI</h2>
      <button id="toggle-build-btn">&#9658; Expandir</button>
    </div>
    <div id="build-body" style="display:none;">
      <div class="grid grid-3" style="margin-bottom: 16px;">
        <div class="card stat" id="kpi-build-count"></div>
        <div class="card stat" id="kpi-build-time"></div>
        <div class="card stat" id="kpi-build-success"></div>
      </div>
      <canvas id="build-trend-chart"></canvas>
    </div>
  </div>

  <div class="card" id="trend-card" style="margin-top: 16px; display:none;">
    <div class="card-header">
      <h2>Tendência — PRs concluídas por semana</h2>
      <button id="toggle-trend-btn">&#9658; Expandir</button>
    </div>
    <div id="trend-body" style="display:none;">
      <canvas id="trend-chart"></canvas>
    </div>
  </div>

  <div class="card" id="repo-pie-card" style="margin-top: 16px; display:none;">
    <div class="card-header">
      <h2>PRs concluídas por repositório</h2>
      <button id="toggle-repo-pie-btn">&#9658; Expandir</button>
    </div>
    <div id="repo-pie-body" style="display:none;">
      <canvas id="prs-by-repo-chart"></canvas>
    </div>
  </div>

  <div class="card" style="margin-top: 16px;">
    <div class="card-header"><h2>PRs abertas</h2></div>
    <p class="muted" style="margin-top: 4px;">Ordenadas pelo maior tempo de espera. O filtro de data não se aplica a esta lista.</p>
    <div style="margin: 8px 0;">
      <button id="toggle-critical-btn">Mostrar apenas PRs críticas (&gt;3 dias)</button>
    </div>
    <div id="open-prs-list"></div>
  </div>

  <div class="card" style="margin-top: 16px;">
    <div class="card-header"><h2>Ranking de Revisores</h2></div>
    <div id="reviewer-ranking"></div>
  </div>

  <div class="card" style="margin-top: 16px;">
    <div class="card-header"><h2>Ranking de PRs por Autor</h2></div>
    <div id="author-ranking"></div>
  </div>
</main>

<script type="module">
  import { renderTopbar, requireConfigOrRedirect, escapeHtml, showError, formatOpenDuration, buildPrUrl } from './js/ui.js'
  import { createChart, PALETTE } from './js/charts.js'
  import { clearCache } from './js/cache.js'
  import { listRepositories, listPullRequests } from './js/api.js'
  import { avgApprovalTime, prAuthorRanking, avgFilesPerPr, fetchFileCounts } from './js/modules/commits.js'
  import { avgTimeToFirstReview, reviewStatsByReviewer } from './js/modules/reviews.js'
  import { loadPRBuilds, buildMetrics, buildsByPrNumber, prLastBuildSummary, buildTrendByWeek, formatBuildDuration } from './js/modules/builds.js'

  renderTopbar('codereview')
  if (!requireConfigOrRedirect()) throw new Error('redirecting')

  const REPO_STORAGE_KEY = 'azdo_codereview_repos'

  const state = {
    startDate: null,
    endDate: null,
    selectedRepos: new Set(),
    allRepos: [],
    lastActivePrs: [],
    lastOpenPrFileCounts: new Map(),
    lastBuildsByPr: new Map(),
    showOnlyCritical: false,
  }

  function initDates() {
    const end = new Date()
    const start = new Date()
    start.setDate(start.getDate() - 30)
    document.getElementById('start-date').value = start.toISOString().slice(0, 10)
    document.getElementById('end-date').value = end.toISOString().slice(0, 10)
    state.startDate = start
    state.endDate = end
  }

  function readDates() {
    const s = document.getElementById('start-date').value
    const e = document.getElementById('end-date').value
    if (s) { state.startDate = new Date(s + 'T00:00:00') }
    if (e) { state.endDate = new Date(e + 'T23:59:59') }
  }

  function updateRepoCount() {
    document.getElementById('repo-count').textContent = state.selectedRepos.size
  }

  function saveSelectedRepos() {
    localStorage.setItem(REPO_STORAGE_KEY, JSON.stringify([...state.selectedRepos]))
  }

  function loadSavedRepos() {
    try {
      const raw = localStorage.getItem(REPO_STORAGE_KEY)
      if (raw) return new Set(JSON.parse(raw))
    } catch {}
    return null
  }

  async function loadRepos() {
    const repos = await listRepositories()
    state.allRepos = repos
    const saved = loadSavedRepos()
    const container = document.getElementById('repo-checkboxes')

    if (saved) {
      state.selectedRepos = new Set([...saved].filter(id => repos.some(r => r.id === id)))
    } else {
      state.selectedRepos = new Set(repos.map(r => r.id))
    }

    container.innerHTML = repos.map(r => {
      const checked = state.selectedRepos.has(r.id) ? 'checked' : ''
      return `<label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input type="checkbox" data-repo-id="${escapeHtml(r.id)}" ${checked}> ${escapeHtml(r.name)}
      </label>`
    }).join('')

    updateRepoCount()

    container.addEventListener('change', (e) => {
      const cb = e.target.closest('input[data-repo-id]')
      if (!cb) return
      if (cb.checked) state.selectedRepos.add(cb.dataset.repoId)
      else state.selectedRepos.delete(cb.dataset.repoId)
      updateRepoCount()
      saveSelectedRepos()
      loadData()
    })
  }

  document.getElementById('toggle-all-repos').addEventListener('click', () => {
    const allChecked = state.selectedRepos.size === state.allRepos.length
    const checkboxes = document.querySelectorAll('#repo-checkboxes input[type="checkbox"]')
    if (allChecked) {
      state.selectedRepos.clear()
      checkboxes.forEach(cb => cb.checked = false)
    } else {
      state.allRepos.forEach(r => state.selectedRepos.add(r.id))
      checkboxes.forEach(cb => cb.checked = true)
    }
    updateRepoCount()
    saveSelectedRepos()
    loadData()
  })

  document.getElementById('toggle-repos-panel').addEventListener('click', () => {
    document.getElementById('repos-panel').style.display = 'block'
    document.getElementById('toggle-repos-panel').style.display = 'none'
  })

  document.getElementById('collapse-repos-panel').addEventListener('click', () => {
    document.getElementById('repos-panel').style.display = 'none'
    document.getElementById('toggle-repos-panel').style.display = ''
  })

  document.getElementById('apply-btn').addEventListener('click', () => {
    readDates()
    loadData()
  })

  document.getElementById('refresh-btn').addEventListener('click', () => {
    clearCache()
    readDates()
    loadData()
  })

  document.getElementById('clear-cache-btn').addEventListener('click', () => {
    clearCache()
    alert('Cache limpo.')
  })

  document.getElementById('toggle-critical-btn').addEventListener('click', () => {
    state.showOnlyCritical = !state.showOnlyCritical
    document.getElementById('toggle-critical-btn').textContent = state.showOnlyCritical
      ? 'Mostrar todas as PRs'
      : 'Mostrar apenas PRs críticas (>3 dias)'
    renderOpenPrsList(state.lastActivePrs, state.lastOpenPrFileCounts, state.lastBuildsByPr)
  })

  function bucketByWeek(prs, startDate, endDate) {
    const start = new Date(startDate)
    const day = start.getDay()
    start.setDate(start.getDate() - (day === 0 ? 6 : day - 1))
    start.setHours(0, 0, 0, 0)

    const labels = [], data = [], weekStarts = []
    for (let d = new Date(start); d <= endDate; d.setDate(d.getDate() + 7)) {
      weekStarts.push(new Date(d))
      labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }))
      data.push(0)
    }

    for (const pr of prs) {
      const closed = new Date(pr.closedDate)
      for (let i = weekStarts.length - 1; i >= 0; i--) {
        if (closed >= weekStarts[i]) { data[i]++; break }
      }
    }

    return { labels, data }
  }

  function countByRepository(prs) {
    const counts = new Map()
    for (const pr of prs) {
      const name = pr.repository?.name ?? 'Desconhecido'
      counts.set(name, (counts.get(name) ?? 0) + 1)
    }
    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1])
    return {
      labels: sorted.map(([name]) => name),
      data: sorted.map(([, count]) => count),
    }
  }

  function renderTrendChart(completedPrs) {
    const card = document.getElementById('trend-card')
    const { labels, data } = bucketByWeek(completedPrs, state.startDate, state.endDate)
    if (!labels.length) { card.style.display = 'none'; return }
    card.style.display = ''
    createChart(document.getElementById('trend-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'PRs concluídas',
          data,
          tension: 0.3,
          fill: true,
          backgroundColor: 'rgba(9,105,218,0.08)',
          borderColor: '#2f81f7',
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        aspectRatio: 6,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    })
  }

  function renderRepoPieChart(completedPrs) {
    const card = document.getElementById('repo-pie-card')
    const { labels, data } = countByRepository(completedPrs)
    if (!labels.length) { card.style.display = 'none'; return }
    card.style.display = ''
    createChart(document.getElementById('prs-by-repo-chart'), {
      type: 'pie',
      data: {
        labels,
        datasets: [{ data, backgroundColor: PALETTE }],
      },
      options: {
        responsive: true,
        aspectRatio: 6,
        maintainAspectRatio: true,
        plugins: { legend: { position: 'right' } },
      },
    })
  }

  document.getElementById('toggle-build-btn').addEventListener('click', () => {
    const body = document.getElementById('build-body')
    const btn = document.getElementById('toggle-build-btn')
    const collapsed = body.style.display === 'none'
    body.style.display = collapsed ? '' : 'none'
    btn.innerHTML = collapsed ? '&#9660; Recolher' : '&#9658; Expandir'
  })

  document.getElementById('toggle-trend-btn').addEventListener('click', () => {
    const body = document.getElementById('trend-body')
    const btn = document.getElementById('toggle-trend-btn')
    const collapsed = body.style.display === 'none'
    body.style.display = collapsed ? '' : 'none'
    btn.innerHTML = collapsed ? '&#9660; Recolher' : '&#9658; Expandir'
  })

  document.getElementById('toggle-repo-pie-btn').addEventListener('click', () => {
    const body = document.getElementById('repo-pie-body')
    const btn = document.getElementById('toggle-repo-pie-btn')
    const collapsed = body.style.display === 'none'
    body.style.display = collapsed ? '' : 'none'
    btn.innerHTML = collapsed ? '&#9660; Recolher' : '&#9658; Expandir'
  })

  function buildResultBadge(summary) {
    if (!summary) return '—'
    const dur = formatBuildDuration(summary.durationMinutes)
    if (summary.result === 'inProgress') return `<span class="badge primary">⟳ em execução</span>`
    if (summary.result === 'succeeded') return `<span class="badge success">✓ ${dur}</span>`
    if (summary.result === 'partiallySucceeded') return `<span class="badge warning">~ ${dur}</span>`
    if (summary.result === 'failed') return `<span class="badge danger">✗ ${dur}</span>`
    return `<span class="badge">${dur}</span>`
  }

  function renderBuildCard(builds) {
    const card = document.getElementById('build-card')
    if (!builds.length) { card.style.display = 'none'; return }
    card.style.display = ''

    const { avgDurationMinutes, successRate, total } = buildMetrics(builds)
    document.getElementById('kpi-build-count').innerHTML =
      `<div class="label">Execuções de build no período</div><div class="value">${total}</div>`
    document.getElementById('kpi-build-time').innerHTML =
      `<div class="label">Tempo médio de build</div><div class="value">${formatBuildDuration(avgDurationMinutes)}</div>`
    document.getElementById('kpi-build-success').innerHTML =
      `<div class="label">Taxa de sucesso</div><div class="value">${successRate != null ? successRate.toFixed(1) + '<span style="font-size:14px">%</span>' : '—'}</div>`

    const { labels, data } = buildTrendByWeek(builds, state.startDate, state.endDate)
    createChart(document.getElementById('build-trend-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Tempo médio de build (min)',
          data,
          tension: 0.3,
          fill: true,
          backgroundColor: 'rgba(26,127,55,0.08)',
          borderColor: '#3fb950',
          pointRadius: 4,
          spanGaps: true,
        }]
      },
      options: {
        responsive: true,
        aspectRatio: 6,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, title: { display: true, text: 'minutos' } } }
      }
    })
  }

  function filterByRepo(prs) {
    if (!state.selectedRepos.size) return []
    return prs.filter(pr => state.selectedRepos.has(pr.repository?.id))
  }

  function prStaleBadge(creationDate, now) {
    const days = (now - new Date(creationDate)) / 86400000
    if (days < 1)  return '<span class="badge success">🟢</span>'
    if (days <= 2) return '<span class="badge warning">🟡</span>'
    return '<span class="badge danger">🔴</span>'
  }

  function filterByDate(prs) {
    return prs.filter(pr => {
      const date = new Date(pr.closedDate || pr.creationDate)
      return date >= state.startDate && date <= state.endDate
    })
  }

  function renderKpis(completedCount, abandonedCount, avgApproval, avgFirstReview, avgFiles) {
    const approvalDisplay = avgApproval != null ? avgApproval.toFixed(1) : '—'
    const firstReviewDisplay = avgFirstReview != null ? avgFirstReview.toFixed(1) : '—'
    const filesDisplay = avgFiles != null ? avgFiles.toFixed(1) : '—'
    document.getElementById('kpi-row').innerHTML = `
      <div class="card stat"><div class="label">PRs concluídas no período</div><div class="value">${completedCount}</div></div>
      <div class="card stat"><div class="label">PRs abandonadas no período</div><div class="value">${abandonedCount}</div></div>
      <div class="card stat"><div class="label">Tempo médio de aprovação</div><div class="value">${approvalDisplay}<span style="font-size:14px"> horas</span></div></div>
      <div class="card stat"><div class="label">Tempo médio até 1ª revisão</div><div class="value">${firstReviewDisplay}<span style="font-size:14px"> horas</span></div></div>
      <div class="card stat"><div class="label">Arquivos alterados por PR (média)</div><div class="value">${filesDisplay}</div></div>
    `
  }

  function renderOpenPrsList(activePrs, fileCountMap = null, buildsByPr = null) {
    const container = document.getElementById('open-prs-list')
    const now = new Date()

    let filtered = activePrs.slice().sort((a, b) => new Date(a.creationDate) - new Date(b.creationDate))
    if (state.showOnlyCritical) {
      filtered = filtered.filter(p => (now - new Date(p.creationDate)) / 86400000 > 3)
    }
    const sorted = filtered.slice(0, 30)

    if (!sorted.length) {
      container.innerHTML = '<p class="muted">Nenhuma PR aberta nos repositórios selecionados.</p>'
      return
    }

    const body = sorted.map(p => {
      const url = buildPrUrl(p)
      const fileCount = fileCountMap?.get(p.pullRequestId) ?? '—'
      const prBuilds = buildsByPr?.get(p.pullRequestId)
      const buildSummary = prBuilds ? prLastBuildSummary(prBuilds) : null
      return `
        <tr>
          <td>#${p.pullRequestId}</td>
          <td><a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(p.title || '(sem título)')}</a></td>
          <td>${escapeHtml(p.repository?.name || '—')}</td>
          <td>${escapeHtml(p.createdBy?.displayName || '—')}</td>
          <td>${formatOpenDuration(p.creationDate, now)}</td>
          <td>${fileCount}</td>
          <td>${buildResultBadge(buildSummary)}</td>
          <td>${prStaleBadge(p.creationDate, now)}</td>
        </tr>`
    }).join('')

    container.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Título</th><th>Repositório</th><th>Autor</th><th>Aberta há</th><th>Arquivos</th><th>Build</th><th>Status</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    `
  }

  function renderAuthorRanking(completedPrs, abandonedPrs, activePrs, fileCountMap = null) {
    const container = document.getElementById('author-ranking')
    const rows = prAuthorRanking(completedPrs, abandonedPrs, activePrs)
    if (!rows.length) {
      container.innerHTML = '<p class="muted">Nenhum autor encontrado no período.</p>'
      return
    }

    const authorFileCounts = new Map()
    if (fileCountMap) {
      for (const pr of [...completedPrs, ...abandonedPrs]) {
        const count = fileCountMap.get(pr.pullRequestId)
        if (count == null) continue
        const author = pr.createdBy?.displayName || 'Desconhecido'
        if (!authorFileCounts.has(author)) authorFileCounts.set(author, [])
        authorFileCounts.get(author).push(count)
      }
    }

    const body = rows.map(r => {
      const avg = r.avgApprovalHours != null ? r.avgApprovalHours.toFixed(1) + ' h' : '—'
      const fileCounts = authorFileCounts.get(r.author)
      const avgFiles = fileCounts?.length
        ? (fileCounts.reduce((a, b) => a + b, 0) / fileCounts.length).toFixed(1)
        : '—'
      return `<tr>
        <td>${escapeHtml(r.author)}</td>
        <td>${r.completed}</td>
        <td>${r.open}</td>
        <td>${r.abandoned}</td>
        <td>${avg}</td>
        <td>${avgFiles}</td>
      </tr>`
    }).join('')
    container.innerHTML = `
      <table>
        <thead><tr><th>Autor</th><th>PRs concluídas</th><th>PRs abertas</th><th>PRs abandonadas</th><th>Tempo médio de aprovação</th><th>Média de arquivos</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    `
  }

  function renderReviewerRanking(prs) {
    const container = document.getElementById('reviewer-ranking')
    const stats = reviewStatsByReviewer(prs)
    if (!stats.length) {
      container.innerHTML = '<p class="muted">Nenhum revisor encontrado no período.</p>'
      return
    }
    const rows = stats.map(s => {
      const rate = s.reviews > 0 ? (s.approved / s.reviews * 100).toFixed(1) + '%' : '—'
      return `<tr>
        <td>${escapeHtml(s.reviewer)}</td>
        <td>${s.reviews}</td>
        <td>${rate}</td>
      </tr>`
    }).join('')
    container.innerHTML = `
      <table>
        <thead><tr><th>Revisor</th><th>PRs revisadas</th><th>Taxa de aprovação</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `
  }

  async function loadData() {
    const status = document.getElementById('global-status')
    status.innerHTML = '<div class="alert info"><span class="spinner"></span> Carregando dados do Azure DevOps...</div>'
    try {
      const [active, completed, abandoned, allBuilds] = await Promise.all([
        listPullRequests({ status: 'active', top: 500 }),
        listPullRequests({ status: 'completed', top: 500 }),
        listPullRequests({ status: 'abandoned', top: 500 }),
        loadPRBuilds({ startDate: state.startDate, endDate: state.endDate }),
      ])

      const activeByRepo = filterByRepo(active.filter(pr => !pr.isDraft))
      const completedFiltered = filterByDate(filterByRepo(completed))
      const abandonedFiltered = filterByDate(filterByRepo(abandoned))

      const monitoredPrIds = new Set(
        [...activeByRepo, ...completedFiltered, ...abandonedFiltered].map(p => p.pullRequestId)
      )
      const builds = allBuilds.filter(b => {
        const prNum = b.triggerInfo?.['pr.number']
        return prNum != null && monitoredPrIds.has(parseInt(prNum, 10))
      })

      const allDateFiltered = [...completedFiltered, ...abandonedFiltered]
      const [approval, firstReview, avgFiles] = await Promise.all([
        Promise.resolve(avgApprovalTime(allDateFiltered)),
        avgTimeToFirstReview(allDateFiltered),
        avgFilesPerPr(allDateFiltered),
      ])

      state.lastActivePrs = activeByRepo
      state.lastOpenPrFileCounts = new Map()
      state.lastBuildsByPr = buildsByPrNumber(builds)

      renderKpis(completedFiltered.length, abandonedFiltered.length, approval, firstReview, avgFiles)
      renderBuildCard(builds)
      renderTrendChart(completedFiltered)
      renderRepoPieChart(completedFiltered)
      renderOpenPrsList(activeByRepo, null, state.lastBuildsByPr)
      renderReviewerRanking(allDateFiltered)
      renderAuthorRanking(completedFiltered, abandonedFiltered, activeByRepo, null)

      fetchFileCounts(activeByRepo.slice(0, 30), { maxPrs: 30 }).then(map => {
        state.lastOpenPrFileCounts = map
        renderOpenPrsList(state.lastActivePrs, map, state.lastBuildsByPr)
      })

      fetchFileCounts([...completedFiltered, ...abandonedFiltered], { maxPrs: 50 }).then(map => {
        renderAuthorRanking(completedFiltered, abandonedFiltered, activeByRepo, map)
      })

      status.innerHTML = ''
    } catch (e) {
      console.error(e)
      showError('global-status', `Erro ao carregar dados: ${e.message}`)
    }
  }

  async function init() {
    initDates()
    await loadRepos()
    loadData()
  }

  init()
</script>
</body>
</html>
